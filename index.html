  <style>
    /* Se importa la fuente WildWords, tipo manga */
    /* POR VER, NO ESTOY SEGURO, SE MIRA RARO XD */
    @font-face {
      font-family: "WildWords";
      src: url("./fonts/CC_Wild_Words_Int_Roman_2.ttf") format("truetype");
      font-weight: 100;
      font-style: normal;
    }

    html {
      font-family: 'WildWords',  system-ui, sans-serif;
      /* background: #fff8ff; */
    }

    /* Estilos para el contenedor de imágenes */
    .imagesContainer {
      width: 210px;
      height: auto;
      max-width: 100%;
      overflow: hidden;
      position: relative;
    }

    /* Estilos para el carrusel */
    .carousel {
      display: flex;
      transition: transform 1s ease-in-out;
      width: 100%;
      /* Ajusta según sea necesario */
      box-sizing: border-box;
      /* Evita que el padding afecte el ancho total */
    }

    /* Estilos para las imágenes del carrusel */
    .carousel-image {
      flex: 0 0 100%;
      /* Cada imagen ocupa el 100% del ancho del carrusel */
      max-width: 100%;
      /* Evita que las imágenes sean más grandes que el contenedor */
      height: auto;
      box-sizing: border-box;
      /* Evita que el padding afecte la altura total */
    }

    /* Estilos para dispositivos más pequeños (menores a 600px de ancho) */
    @media only screen and (max-width: 1080px) {

      /* yellowuce el tamaño del canvas en dispositivos móviles */
      #canvas {
        width: 400px;
        /* Puedes ajustar este valor según tus necesidades */
        height: 400px;
        /* Puedes ajustar este valor según tus necesidades */
      }

      #updateButton,
      #numOptions,
      #spin {
        font-size: 12px;
        /* yellowucir el tamaño de la fuente */
        padding: 4px 10px;
        /* yellowucir el relleno */
        margin: 0;
        /* Eliminar los márgenes */
      }

      #animatedImageContainer {
        display: none;
      }
    }

    /* DJ animations */
    /* SE ELIMINA */
    /* .animate-in {
        pointer-events: none;
        opacity: 1;
        transform: translateX(170%);
        transition: transform 12s ease, opacity 0.5s ease;
    }

    .animate-out {
        transform: translateX(-100%);
        transition: transform 12s ease-in-out;
    } */

    /* Animaciones Leji chiquito girando */
    @keyframes moverDerecha {
      0% {
        left: 0;
      }

      50% {
        left: calc(100% - 200px);
      }

      /* Ajusta 200px según el tamaño de la imagen */
      100% {
        left: 0;
      }
    }

    .animacion-imagen {
      animation: moverDerecha 90s linear infinite;
      /* Modifica 10s para cambiar la duración de la animación */
    }

    /* Modal */
    #puta,
    #sofia {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      margin: auto;
      width: auto;
      height: 90%;
      object-fit: cover;
      z-index: 9999;
      /* Asegura que el video esté en la capa superior */
    }


    /* Estilo para el modal */
    .modal {
      display: none;
      /* Ocultamos el modal por defecto */
      position: fixed;
      /* Posición fija */
      z-index: 44;
      /* Por encima de otros elementos */
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* Oculta el desbordamiento */
      background-color: rgba(0, 0, 0, 0.8);
      /* Fondo semitransparente */
    }

    /* Estilo para la imagen dentro del modal */
    .modal-content {
      position: absolute;
      margin: auto;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      max-width: 100%;
      max-height: 100%;
    }
  </style>

</head>
